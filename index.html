<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>카페 기록 메뉴 보드</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <!-- 시작 스플래시: girokrecipebook.jpg -->
  <div class="splash" id="splash">
    <button class="splash-hit-area" id="enterButton" type="button" aria-label="레시피 북 열기">
      <div class="splash-image-frame"></div>
    </button>
  </div>

  <!-- 실제 메인 앱: 처음엔 hidden -->
  <div class="app-shell" hidden>
    <header class="hero">
      <section class="brand-card">
        <div class="brand-top">
          <div class="brand-mark">
            <span>GIROK</span><span class="dot"></span>
          </div>
          <button class="theme-toggle" type="button" data-theme-toggle aria-label="다크 모드 전환">
            ◐
          </button>
        </div>
        <div class="hero-copy">
          <h1>카페 기록 메뉴 & 레시피</h1>
          <p>휴대폰, 패드, PC에서 모두 보기 좋은 반응형 메뉴판입니다.</p>
        </div>
        <div class="hero-meta">
          <div class="meta-card">
            <strong id="totalCount">0개 메뉴</strong>
            <span>등록된 전체 메뉴</span>
          </div>
        </div>
      </section>

      <aside class="brand-card brand-card--light">
        <div>
          <div class="eyebrow">로스터리 원두</div>
          <h2 class="side-title">커피화 블렌드</h2>
        </div>
        <div class="bean-list" id="beanList"></div>
      </aside>
    </header>

    <div class="control-strip">
      <div class="chip-row" role="tablist" aria-label="카테고리 필터">
        <button class="chip active" type="button" data-filter="ALL">전체</button>
        <button class="chip" type="button" data-filter="COFFEE">COFFEE</button>
        <button class="chip" type="button" data-filter="TEA">TEA</button>
        <button class="chip" type="button" data-filter="DRINK">DRINK</button>
      </div>
    </div>

    <main id="menu-content" class="board"></main>
  </div>

  <!-- A KEEN 스타일 풀스크린 레시피 팝업 -->
  <div class="sheet sheet--full" id="recipeSheet" aria-hidden="true">
    <div class="sheet-backdrop" data-close-sheet></div>

    <section class="sheet-panel" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
      <div class="sheet-head">
        <div class="sheet-title">
          <h3 id="sheetTitle">메뉴명</h3>
          <p id="sheetSubtitle">영문명</p>
        </div>
        <button class="sheet-close" type="button" data-close-sheet aria-label="팝업 닫기">
          ✕
        </button>
      </div>

      <!-- 이 영역 전체가 세로 스크롤 -->
      <div class="sheet-body">
        <div class="sheet-section">
          <h4 class="sheet-section-title">RECIPE</h4>
          <div class="recipe-grid" id="sheetContent"></div>
        </div>
      </div>
    </section>
  </div>

  <script src="./js/app.js"></script>
</body>
</html>
